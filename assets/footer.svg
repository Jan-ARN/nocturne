<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 170" width="1200" height="170" role="img" aria-label="the same ridgeline at night — the music never stops">
  <defs>
    <linearGradient id="night" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#0B141C"/>
      <stop offset="0.6" stop-color="#101F2A"/>
      <stop offset="1"   stop-color="#1A3142"/>
    </linearGradient>
    <radialGradient id="moonGlowF" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#F3ECDB" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#F3ECDB" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="eqF" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F0C880" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#C79A5E" stop-opacity="0.85"/>
    </linearGradient>
    <clipPath id="frameF"><rect width="1200" height="170"/></clipPath>
  </defs>

  <g clip-path="url(#frameF)">
    <rect width="1200" height="170" fill="url(#night)"/>

    <!-- moon -->
    <g transform="translate(1010,40)">
      <circle r="32" fill="url(#moonGlowF)"/>
      <circle r="15" fill="#F3ECDB" opacity="0.9"/>
    </g>

    <!-- denser stars -->
    <g fill="#DCE6EE">
      <circle cx="120" cy="28" r="1.1" opacity="0.8"><animate attributeName="opacity" values="0.8;0.25;0.8" dur="4.5s" repeatCount="indefinite"/></circle>
      <circle cx="260" cy="44" r="0.9" opacity="0.5"/>
      <circle cx="420" cy="24" r="1.0" opacity="0.7"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="6s" repeatCount="indefinite"/></circle>
      <circle cx="560" cy="52" r="0.8" opacity="0.45"/>
      <circle cx="700" cy="30" r="1.1" opacity="0.75"><animate attributeName="opacity" values="0.75;0.25;0.75" dur="5.2s" repeatCount="indefinite"/></circle>
      <circle cx="860" cy="48" r="0.9" opacity="0.5"/>
      <circle cx="340" cy="66" r="0.7" opacity="0.4"/>
      <circle cx="640" cy="70" r="0.7" opacity="0.4"/>
    </g>

    <!-- ridges, the closing shot -->
    <path d="M0,118 L220,82 L420,116 L620,76 L840,114 L1040,84 L1200,112 L1200,170 L0,170 Z"
          fill="#1A3142" opacity="0.9"/>

    <!-- a quiet equalizer still playing -->
    <g fill="url(#eqF)">
      <rect x="556" y="104" width="8" height="14" rx="2"><animate attributeName="height" values="10;26;10" dur="1.3s" repeatCount="indefinite"/><animate attributeName="y" values="108;92;108" dur="1.3s" repeatCount="indefinite"/></rect>
      <rect x="570" y="96"  width="8" height="22" rx="2"><animate attributeName="height" values="24;8;24" dur="1.1s" repeatCount="indefinite"/><animate attributeName="y" values="94;110;94" dur="1.1s" repeatCount="indefinite"/></rect>
      <rect x="584" y="88"  width="8" height="30" rx="2"><animate attributeName="height" values="30;12;30" dur="1.55s" repeatCount="indefinite"/><animate attributeName="y" values="88;106;88" dur="1.55s" repeatCount="indefinite"/></rect>
      <rect x="598" y="100" width="8" height="18" rx="2"><animate attributeName="height" values="16;32;16" dur="0.95s" repeatCount="indefinite"/><animate attributeName="y" values="102;86;102" dur="0.95s" repeatCount="indefinite"/></rect>
      <rect x="612" y="92"  width="8" height="26" rx="2"><animate attributeName="height" values="26;10;26" dur="1.4s" repeatCount="indefinite"/><animate attributeName="y" values="92;108;92" dur="1.4s" repeatCount="indefinite"/></rect>
      <rect x="626" y="104" width="8" height="14" rx="2"><animate attributeName="height" values="12;24;12" dur="1.2s" repeatCount="indefinite"/><animate attributeName="y" values="106;94;106" dur="1.2s" repeatCount="indefinite"/></rect>
    </g>

    <path d="M0,170 L0,140 L160,108 L340,146 L520,104 L720,144 L920,106 L1120,142 L1200,124 L1200,170 Z"
          fill="#0E1C26"/>

    <text x="600" y="158" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" font-weight="500" fill="#5E7C90" letter-spacing="3">ENDLESS · NEVER THE SAME TWICE</text>
  </g>
</svg>
