<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="Nocturne — generative music in the browser">
  <defs>
    <!-- dusk sky (same world as the Jan-ARN profile) -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#0F1C26"/>
      <stop offset="0.45" stop-color="#1C3445"/>
      <stop offset="0.78" stop-color="#2F4D63"/>
      <stop offset="1"    stop-color="#456A82"/>
    </linearGradient>
    <!-- warm glow low on the horizon -->
    <radialGradient id="sun" cx="0.5" cy="0.95" r="0.6">
      <stop offset="0"   stop-color="#C79A5E" stop-opacity="0.5"/>
      <stop offset="0.4" stop-color="#A87E54" stop-opacity="0.2"/>
      <stop offset="1"   stop-color="#A87E54" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moonGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#F3ECDB" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#F3ECDB" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mist" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9FBBCD" stop-opacity="0"/>
      <stop offset="1" stop-color="#9FBBCD" stop-opacity="0.16"/>
    </linearGradient>
    <!-- the equalizer glows like the profile beacon -->
    <linearGradient id="eq" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F0C880"/>
      <stop offset="1" stop-color="#C79A5E"/>
    </linearGradient>
    <clipPath id="frame"><rect width="1200" height="300"/></clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1200" height="300" fill="url(#sky)"/>
    <rect width="1200" height="300" fill="url(#sun)"/>

    <!-- moon, upper right -->
    <g transform="translate(1000,78)">
      <circle r="46" fill="url(#moonGlow)"/>
      <circle r="22" fill="#F3ECDB" opacity="0.92"/>
    </g>

    <!-- faint twinkling stars -->
    <g fill="#DCE6EE">
      <circle cx="140" cy="48"  r="1.1" opacity="0.7"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="5s" repeatCount="indefinite"/></circle>
      <circle cx="320" cy="30"  r="0.9" opacity="0.5"><animate attributeName="opacity" values="0.5;0.15;0.5" dur="6.5s" repeatCount="indefinite"/></circle>
      <circle cx="520" cy="60"  r="1.0" opacity="0.6"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="4.2s" repeatCount="indefinite"/></circle>
      <circle cx="240" cy="90"  r="0.8" opacity="0.4"/>
      <circle cx="760" cy="44"  r="1.1" opacity="0.6"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="5.8s" repeatCount="indefinite"/></circle>
      <circle cx="860" cy="96"  r="0.9" opacity="0.45"/>
      <circle cx="660" cy="36"  r="0.8" opacity="0.4"/>
      <circle cx="1140" cy="120" r="0.9" opacity="0.5"/>
    </g>

    <!-- ridge 4: farthest -->
    <path d="M0,196 L150,150 L300,182 L470,132 L640,176 L820,138 L1000,178 L1200,150 L1200,300 L0,300 Z"
          fill="#3E6076" opacity="0.45"/>
    <!-- ridge 3 -->
    <path d="M0,224 L180,176 L360,214 L540,162 L760,210 L980,168 L1200,206 L1200,300 L0,300 Z"
          fill="#314F66" opacity="0.7"/>
    <!-- drifting mist band -->
    <g opacity="0.7">
      <rect x="-200" y="206" width="1600" height="60" fill="url(#mist)"/>
      <animateTransform attributeName="transform" type="translate" values="-40 0; 40 0; -40 0" dur="22s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" keyTimes="0;0.5;1"/>
    </g>
    <!-- ridge 2 -->
    <path d="M0,252 L220,200 L420,246 L620,194 L840,244 L1040,202 L1200,240 L1200,300 L0,300 Z"
          fill="#243F52" opacity="0.9"/>

    <!-- equalizer rising off the ridge — the generative groove -->
    <g fill="url(#eq)">
      <rect x="503" y="232" width="11" height="20" rx="2"><animate attributeName="height" values="14;40;14" dur="1.3s" repeatCount="indefinite"/><animate attributeName="y" values="238;212;238" dur="1.3s" repeatCount="indefinite"/></rect>
      <rect x="522" y="220" width="11" height="32" rx="2"><animate attributeName="height" values="34;10;34" dur="1.1s" repeatCount="indefinite"/><animate attributeName="y" values="218;242;218" dur="1.1s" repeatCount="indefinite"/></rect>
      <rect x="541" y="208" width="11" height="44" rx="2"><animate attributeName="height" values="46;18;46" dur="1.6s" repeatCount="indefinite"/><animate attributeName="y" values="206;234;206" dur="1.6s" repeatCount="indefinite"/></rect>
      <rect x="560" y="226" width="11" height="26" rx="2"><animate attributeName="height" values="22;48;22" dur="0.95s" repeatCount="indefinite"/><animate attributeName="y" values="230;204;230" dur="0.95s" repeatCount="indefinite"/></rect>
      <rect x="579" y="214" width="11" height="38" rx="2"><animate attributeName="height" values="40;14;40" dur="1.45s" repeatCount="indefinite"/><animate attributeName="y" values="212;238;212" dur="1.45s" repeatCount="indefinite"/></rect>
      <rect x="598" y="200" width="11" height="52" rx="2"><animate attributeName="height" values="52;22;52" dur="1.2s" repeatCount="indefinite"/><animate attributeName="y" values="200;230;200" dur="1.2s" repeatCount="indefinite"/></rect>
      <rect x="617" y="214" width="11" height="38" rx="2"><animate attributeName="height" values="38;12;38" dur="1.05s" repeatCount="indefinite"/><animate attributeName="y" values="214;240;214" dur="1.05s" repeatCount="indefinite"/></rect>
      <rect x="636" y="226" width="11" height="26" rx="2"><animate attributeName="height" values="24;46;24" dur="1.5s" repeatCount="indefinite"/><animate attributeName="y" values="228;206;228" dur="1.5s" repeatCount="indefinite"/></rect>
      <rect x="655" y="208" width="11" height="44" rx="2"><animate attributeName="height" values="44;16;44" dur="1.25s" repeatCount="indefinite"/><animate attributeName="y" values="208;236;208" dur="1.25s" repeatCount="indefinite"/></rect>
      <rect x="674" y="222" width="11" height="30" rx="2"><animate attributeName="height" values="28;44;28" dur="1.0s" repeatCount="indefinite"/><animate attributeName="y" values="224;208;224" dur="1.0s" repeatCount="indefinite"/></rect>
      <rect x="693" y="232" width="11" height="20" rx="2"><animate attributeName="height" values="16;38;16" dur="1.35s" repeatCount="indefinite"/><animate attributeName="y" values="236;214;236" dur="1.35s" repeatCount="indefinite"/></rect>
    </g>

    <!-- ridge 1: front, darkest -->
    <path d="M0,300 L0,266 L160,230 L340,272 L520,224 L720,270 L920,226 L1120,268 L1200,246 L1200,300 Z"
          fill="#152834"/>

    <!-- title block, lower-left -->
    <rect x="82" y="120" width="54" height="4" rx="2" fill="#C79A5E"/>
    <text x="80" y="172" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="700" fill="#F3ECDB" letter-spacing="0.5">Nocturne</text>
    <text x="84" y="206" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#A9C5D6" letter-spacing="4">GENERATIVE MUSIC · IN THE BROWSER</text>
  </g>
</svg>
